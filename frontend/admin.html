<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarvi Seeds Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css">
</head>
<body class="admin-login-page">

  <div class="admin-login-wrap">
    <div class="admin-login-brand">
      <span class="logo-mark" aria-hidden="true">🌱</span>
      <span class="logo-text">Jarvi Seeds <span>& Nursery</span></span>
    </div>

    <div class="login-box">
      <p class="eyebrow"><span class="eyebrow-dot"></span>Restricted Access</p>
      <h2>Admin Login</h2>
      <p class="admin-login-sub">Enter your admin password to access the dashboard.</p>

      <div class="admin-input-wrap">
        <svg class="admin-input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <rect x="5" y="11" width="14" height="9" rx="2" stroke="currentColor" stroke-width="1.6"/>
          <path d="M8 11V7a4 4 0 0 1 8 0v4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        <input
          type="password"
          id="adminKey"
          placeholder="Enter Admin Password">
      </div>

      <button onclick="login()" class="btn btn-primary btn-block">
        Login
        <svg class="btn-arrow" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <p id="message"></p>
    </div>

    <p class="admin-login-footnote">Jarvi Seeds & Nursery Pvt. Ltd. — Internal use only</p>
  </div>

<script src="js/admin.js"></script>
</body>
</html>
